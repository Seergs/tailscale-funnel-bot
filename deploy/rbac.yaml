apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: funnel-bot-cluster-role
rules:
- apiGroups: [""]
  resources: ["services"]
  verbs: ["get", "list"]
- apiGroups: ["networking.k8s.io"]
  resources: ["ingresses"]
  verbs: ["get", "list", "watch", "create", "update", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: funnel-bot-global-binding
subjects:
- kind: ServiceAccount
  name: funnel-bot-sa
  namespace: funnel-bot
roleRef:
  kind: ClusterRole
  name: funnel-bot-cluster-role
  apiGroup: rbac.authorization.k8s.io
